<style>
.select_address{
    max-width:760px;
    width:92%;
    margin:60px auto;
    padding:40px;
    background:#fff;
    border-radius:24px;
    border:1px solid #ececec;
    box-shadow:0 18px 45px rgba(0,0,0,.08);
}

.select_address h3{
    font-size:34px;
    font-weight:700;
    color:#111;
    text-align:center;
    margin-bottom:35px;
}

.select_address ul{
    list-style:none;
    margin:0;
    padding:0;
}

.select_address li{
    margin-bottom:18px;
}

.select_address label{
    display:flex;
    align-items:flex-start;
    gap:16px;
    padding:22px;
    background:#fff;
    border:2px solid #ececec;
    border-radius:18px;
    cursor:pointer;
    font-size:16px;
    line-height:1.7;
    color:#333;
    transition:.35s;
}

.select_address label:hover{
    border-color:#D4AF37;
    background:#fffcf4;
    transform:translateY(-2px);
    box-shadow:0 12px 28px rgba(212,175,55,.18);
}

.select_address input[type="radio"]{
    width:22px;
    height:22px;
    margin-top:2px;
    accent-color:#111;
    cursor:pointer;
}

.select_address input[type="radio"]:checked{
    transform:scale(1.1);
}

.select_address .btn{
    width:100%;
    margin-top:28px;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#111;
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.35s;
}

.select_address .btn:hover{
    background:#D4AF37;
    color:#111;
    box-shadow:0 12px 30px rgba(212,175,55,.35);
}

.select_address .add-btn{
    display:block;
    width:240px;
    margin:22px auto 0;
    padding:15px;
    text-align:center;
    text-decoration:none;
    border:2px solid #111;
    border-radius:50px;
    background:#fff;
    color:#111;
    font-size:15px;
    font-weight:600;
    transition:.35s;
}

.select_address .add-btn:hover{
    background:#111;
    color:#fff;
    transform:translateY(-2px);
}

@media(max-width:768px){

.select_address{
    width:95%;
    padding:28px 22px;
    margin:30px auto;
}

.select_address h3{
    font-size:28px;
}

.select_address label{
    padding:18px;
    font-size:15px;
}

.select_address .add-btn{
    width:100%;
}

}    
.select_address label{
    display:flex;
    align-items:flex-start;
    gap:15px;
    padding:18px 20px;
    border:2px solid #ececec;
    border-radius:16px;
    background:#fff;
    cursor:pointer;
    transition:.3s;

    font-size:16px;
    font-weight:500;
    line-height:1.6;
    color:#333;
}
.select_address h3{
    font-size:30px;
    font-weight:600;
    text-align:center;
    margin-bottom:30px;
    color:#111;
}

</style>
{% extends 'base/base.html' %}

{% block title %}

{% endblock %}

{% block content %}

<div class="select_address">
    <form method="post">
        {% csrf_token %}
        <h3>Select an Address</h3>
        <ul>
            {% for address in addresses %}
            <li>
                <label>
                    <input type="radio" name="address" value="{{ address.id }}">
                    {{ address.full_name }}, {{ address.address_line1 }}, {{ address.city }}, {{ address.state }} - {{ address.pincode }}
                </label>
            </li>
            {% endfor %}
        </ul>
        <button type="submit" class="btn">Select Address</button>
    </form>
    <a href="{% url 'add_address' %}?next={{ request.path }}" class="add-btn">
    Add Address
</a>
</div>
{% endblock %}
