<style>
    .payment-section{

    margin-top:30px;

}

.razorpay-payment-button{

    width:100% !important;

    display:block !important;

    background:#111 !important;

    color:#fff !important;

    border:none !important;

    border-radius:12px !important;

    padding:15px 20px !important;

    font-size:17px !important;

    font-weight:600 !important;

    cursor:pointer !important;

    transition:all .3s ease !important;

}

.razorpay-payment-button:hover{

    background:#D4AF37 !important;

    color:#111 !important;

}

.razorpay-payment-button:focus{

    outline:none !important;

    box-shadow:none !important;

}
</style>
{% if razorpay_order %}
<div class="payment-section mt-4">
    <h4>Proceed to Payment</h4>
    <form id="payment-form" method="post" action="{% url 'payment_success' %}">
        <script src="https://checkout.razorpay.com/v1/checkout.js"
                data-key="{{ key_id }}"
                data-amount="{{ razorpay_order.amount }}"
                data-currency="{{ razorpay_order.currency }}"
                data-order_id="{{ razorpay_order.id }}"
                data-buttontext="Pay Now"
                data-name="My Shopping Site"
                data-description="Complete your purchase"
                data-theme.color="#F37254">
        </script>
        <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
    </form>
</div>
{% else %}
<p class="text-danger mt-4">Please select an address to proceed with payment.</p>
{% endif %}
