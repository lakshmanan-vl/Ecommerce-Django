<style>
    .emptycart{

    min-height:80vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#f8f9fb;

    padding:50px 20px;

}

.cart-empty{

    width:100%;

    display:flex;

    justify-content:center;

    align-items:center;

}

.cart-empty-box{

    width:100%;

    max-width:550px;

    background:#fff;

    padding:60px 40px;

    border-radius:20px;

    text-align:center;

    box-shadow:0 15px 40px rgba(0,0,0,.08);

    transition:.3s;

}

.cart-empty-box:hover{

    transform:translateY(-6px);

    box-shadow:0 20px 50px rgba(0,0,0,.12);

}

.cart-empty-icon{

    width:120px;

    height:120px;

    margin:0 auto 30px;

    border-radius:50%;

    background:#fff7e3;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:60px;

    color:#D4AF37;

}

.cart-empty-box h3{

    font-size:2rem;

    font-weight:700;

    color:#111;

    margin-bottom:15px;

}

.cart-empty-box p{

    color:#666;

    font-size:17px;

    line-height:1.8;

    margin-bottom:35px;

}

.cart-empty-btn{

    display:inline-block;

    padding:15px 40px;

    border-radius:50px;

    background:#111;

    color:#fff;

    text-decoration:none;

    font-size:17px;

    font-weight:600;

    transition:.3s;

}

.cart-empty-btn:hover{

    background:#D4AF37;

    color:#111;

    transform:translateY(-2px);

}

@media(max-width:768px){

.cart-empty-box{

    padding:40px 25px;

}

.cart-empty-icon{

    width:90px;

    height:90px;

    font-size:45px;

}

.cart-empty-box h3{

    font-size:1.6rem;

}

.cart-empty-box p{

    font-size:15px;

}

.cart-empty-btn{

    width:100%;

}

}
</style>
<section class="emptycart">
<div class="cart-empty">
    <div class="cart-empty-box">
        <div class="cart-empty-icon">🛒</div>

        <h3>Your cart is empty</h3>
        <p>Looks like you haven't added anything to your cart yet.</p>

        <a href="{% url 'products' %}" class="cart-empty-btn">
            Continue Shopping
        </a>
    </div>
</div>
</section>
