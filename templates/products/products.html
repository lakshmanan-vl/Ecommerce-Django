
<style>
body{
    background:#f5f6f8;
    font-family:"Poppins",sans-serif;
}

.crud{
    margin:40px 0 35px;
}

.crud .btn{
    background:#111;
    color:#fff;
    padding:14px 32px;
    border:none;
    border-radius:50px;
    font-size:16px;
    font-weight:600;
    text-decoration:none;
    transition:.35s;
    box-shadow:0 12px 30px rgba(0,0,0,.10);
}

.crud .btn:hover{
    background:#D4AF37;
    color:#111;
    transform:translateY(-3px);
    box-shadow:0 18px 35px rgba(212,175,55,.35);
}

.products-section{
    max-width:1400px;
    margin:0 auto;
    padding:20px;
}

.products-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:30px;
}

.product-card{
    background:#fff;
    border-radius:22px;
    overflow:hidden;
    border:1px solid #ececec;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
    transition:.35s;
}

.product-card:hover{
    transform:translateY(-8px);
    box-shadow:0 25px 60px rgba(0,0,0,.12);
}

.product-card img{
    width:100%;
    height:280px;
    object-fit:cover;
    transition:.4s;
}

.product-card:hover img{
    transform:scale(1.05);
}

.product-card-content{
    padding:22px;
}

.product-card h3{
    font-size:20px;
    font-weight:700;
    color:#111;
    margin-bottom:10px;
}

.product-card p{
    color:#666;
    font-size:14px;
    line-height:1.7;
    margin-bottom:18px;
}

.product-price{
    font-size:24px;
    font-weight:700;
    color:#111;
    margin-bottom:18px;
}

.product-card .btn{
    width:100%;
    border:none;
    border-radius:12px;
    padding:14px;
    background:#111;
    color:#fff;
    font-weight:600;
    transition:.3s;
}

.product-card .btn:hover{
    background:#D4AF37;
    color:#111;
}

@media(max-width:768px){

.crud .btn{
    width:90%;
}

.products-grid{
    grid-template-columns:1fr;
}

}
</style>
{% extends 'base/base.html' %}

{% block title %}
Products
{% endblock %}

{% block content %}
<section class="d-flex justify-content-center align-items-center pt-4 crud">
    {% if user.is_staff %}
    <a href="{% url 'add_product' %}" class="btn">Add Product</a>
    {% endif %}
</section>
<section>
    <div>
        {% include 'products/includes/productsSection.html' %}
    </div>
</section>
{% endblock %}
