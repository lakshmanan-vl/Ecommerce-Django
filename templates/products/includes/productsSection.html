<style>
    #carouselExample{
    width:100%;
    height:700px;
    border-radius:24px;
    overflow:hidden;
    background:#fff;
    border:1px solid #ececec;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
    position:relative;
}

#carouselExample .carousel-inner{
    width:100%;
    height:100%;
}

#carouselExample .carousel-item{
    width:100%;
    height:700px;
    display:flex !important;
    justify-content:center;
    align-items:center;
    background:#f8f8f8;
    position:relative;
}

#carouselExample .car{
    width:100%;
    height:100%;
    object-fit:contain;
    padding:25px;
    transition:.4s ease;
}

#carouselExample .carousel-item:hover .car{
    transform:scale(1.04);
}

.carbtns{
    position:absolute;
    top:20px;
    right:20px;
    display:flex;
    gap:12px;
    z-index:100;
}

.icon{
    width:46px;
    height:46px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:50%;
    text-decoration:none;
    color:#fff;
    font-size:18px;
    transition:.3s;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.editcar{
    background:#198754;
}

.editcar:hover{
    background:#157347;
    color:#fff;
}

.delcar{
    background:#dc3545;
}

.delcar:hover{
    background:#bb2d3b;
    color:#fff;
}

.carousel-control-prev,
.carousel-control-next{
    width:50px;
    height:50px;
    background:rgba(0,0,0,.75);
    border-radius:50%;
    top:50%;
    transform:translateY(-50%);
    opacity:1;
}

.carousel-control-prev{
    left:18px;
}

.carousel-control-next{
    right:18px;
}

.carousel-control-prev:hover,
.carousel-control-next:hover{
    background:#D4AF37;
}

.carousel-control-prev-icon,
.carousel-control-next-icon{
    width:20px;
    height:20px;
}

.no-image{
    display:flex !important;
    justify-content:center;
    align-items:center;
    height:700px;
}

.no-image-box{
    text-align:center;
    color:#777;
}

.no-image-box i{
    font-size:90px;
    color:#ccc;
    margin-bottom:15px;
}

.no-image-box p{
    font-size:18px;
    margin:0;
}

@media(max-width:992px){

#carouselExample,
#carouselExample .carousel-item,
.no-image{
    height:500px;
}

}

@media(max-width:576px){

#carouselExample,
#carouselExample .carousel-item,
.no-image{
    height:320px;
}

.carbtns{
    top:10px;
    right:10px;
}

.icon{
    width:38px;
    height:38px;
    font-size:15px;
}

.carousel-control-prev,
.carousel-control-next{
    width:40px;
    height:40px;
}

}
</style>
<section id="products-container" data-add-url = "{% url 'add_to_cart' %}" class="">
{% csrf_token %}
    <div class="row g-4 px-5 py-3 mx-0">
        {% for product in products %}
        <!-- Products card -->
        {% include 'products/includes/ProductCard.html' %}
        {% empty %}
        <div class="col-12 text-center noproduct">
            <p class="text-muted">No products available.</p>
        </div>
        {% endfor %}
    </div>
</section>
