<style>
    #carouselExample{
    width:100%;
    height:700px;
    border-radius:24px;
    overflow:hidden;
    background:#fff;
    border:1px solid #ececec;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
    position:relative;
}

#carouselExample .carousel-inner{
    width:100%;
    height:100%;
}

#carouselExample .carousel-item{
    width:100%;
    height:700px;
    display:flex !important;
    justify-content:center;
    align-items:center;
    background:#f8f8f8;
    position:relative;
}

#carouselExample .car{
    width:100%;
    height:100%;
    object-fit:contain;
    padding:25px;
    transition:.4s ease;
}

#carouselExample .carousel-item:hover .car{
    transform:scale(1.04);
}

.carbtns{
    position:absolute;
    top:20px;
    right:20px;
    display:flex;
    gap:12px;
    z-index:100;
}

.icon{
    width:46px;
    height:46px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:50%;
    text-decoration:none;
    color:#fff;
    font-size:18px;
    transition:.3s;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.editcar{
    background:#111;
}

.editcar:hover{
    background:#1f1e1e;
    color:#fff;
}

.delcar{
    background:#dc3545;
}

.delcar:hover{
    background:#bb2d3b;
    color:#fff;
}

.carousel-control-prev,
.carousel-control-next{
    width:50px;
    height:50px;
    background:rgba(0,0,0,.75);
    border-radius:50%;
    top:50%;
    transform:translateY(-50%);
    opacity:1;
}

.carousel-control-prev{
    left:18px;
}

.carousel-control-next{
    right:18px;
}

.carousel-control-prev:hover,
.carousel-control-next:hover{
    background:#D4AF37;
}

.carousel-control-prev-icon,
.carousel-control-next-icon{
    width:20px;
    height:20px;
}

.no-image{
    display:flex !important;
    justify-content:center;
    align-items:center;
    height:700px;
}

.no-image-box{
    text-align:center;
    color:#777;
}

.no-image-box i{
    font-size:90px;
    color:#ccc;
    margin-bottom:15px;
}

.no-image-box p{
    font-size:18px;
    margin:0;
}

@media(max-width:992px){

#carouselExample,
#carouselExample .carousel-item,
.no-image{
    height:500px;
}

}

@media(max-width:576px){

#carouselExample,
#carouselExample .carousel-item,
.no-image{
    height:320px;
}

.carbtns{
    top:10px;
    right:10px;
}

.icon{
    width:38px;
    height:38px;
    font-size:15px;
}

.carousel-control-prev,
.carousel-control-next{
    width:40px;
    height:40px;
}

}
</style>
<div class="carousel-inner">

    {% if product.images.all %}
    {% for image in product.images.all %}

    <div class="carousel-item {% if forloop.first %}active{% endif %}">
        <img src="{{ image.img.url }}" class="car" alt="{{ product.title }}">

        {% if user.is_staff %}
        <div class="carbtns">
            <a href="{% url 'edit_product_image' image.pk %}" class="icon editcar">
                <i class="bi bi-pencil-square"></i>
            </a>

            <a href="{% url 'delete_product_image' image.pk %}" class="icon delcar">
                <i class="bi bi-trash3"></i>
            </a>
        </div>
        {% endif %}

    </div>

    {% endfor %}
    {% else %}

    <div class="carousel-item active no-image">
        <div class="no-image-box">
            <i class="bi bi-image"></i>
            <p>Image Not Available</p>
        </div>
    </div>

    {% endif %}

</div>

<button class="carousel-control-prev" type="button"
        data-bs-target="#carouselExample"
        data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
</button>

<button class="carousel-control-next" type="button"
        data-bs-target="#carouselExample"
        data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
</button>
